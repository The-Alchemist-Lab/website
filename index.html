      @font-face {
        font-family: BeachResort;
        src: url(Beach_Resort.woff);
      }

      :root {
        --color: DarkCyan;
      }

      * {
        box-sizing: border-box;
      }

      html {
        margin: 0;
        min-height: 100vh;
        width: 100%;
      }

      body {
        margin: 0;
        height: 100vh;
        width: 100%;
        background-image: url("old-yellow-and-brown-parchment-paper-900x1204.jpg");
        background-position: center center;
        background-size: cover;
      }

      h1,
      h2,
      h3 {
        margin: 10px;
        animation: written 4s infinite steps(6, end);
        background: url("https://media.istockphoto.com/id/914698582/photo/dirt-overlay.jpg?s=612x612&w=0&k=20&c=GCxOC_l_Q443A1ctfnDVZquF-pnbo0lbHX-Jg8UObSc=");
        background-size: cover;
        background-repeat: round;
        background-clip: text;
        color: transparent;
        text-shadow: none;
      }

      h1 {
        letter-spacing: 0.25rem;
        font-size: 5rem;
      }

      h2 {
        letter-spacing: 0.2rem;
        font-size: 3.2rem;
      }

      h3 {
        letter-spacing: 0.15rem;
        font-size: 2rem;
      }

      h4 {
        margin: 10px;
        letter-spacing: 0.1rem;
        font-size: 1.25rem;
      }

      p {
        margin: 10px;
        font-size: 1.15rem;
      }

      a {
        color: antiquewhite;
        text-decoration: none;
      }

      a:hover {
        text-decoration: underline;
      }

      ul {
        margin: 10px;
        padding: 0;
        list-style-type: none;
      }

      hr {
        margin: 1rem 10vw;
        width: 80%;
        display: none;
      }

      .brand-font {
        font-family: BeachResort;
      }

      .regular-font {
        font-family: "Yuji Boku", serif;
        font-weight: 500;
      }

      .highlighted-text {
        background: linear-gradient(to bottom, transparent 86%, #c7dccc 0) center center/0% 75% no-repeat;
        color: rgba(80, 89, 113, 0.7);
        background-size: 100% 100%;
      }

      .bounce-text {
        color: var(--color);
        position: static;
        display: inline-flex;
        justify-content: center;
      }

      .bounce-text span {
        animation: bounce 0.7s infinite ease-in-out;
      }

      .bounce-text span:nth-child(1) {
        animation-delay: 0.05s;
      }

      .bounce-text span:nth-child(2) {
        animation-delay: 0.1s;
      }

      .bounce-text span:nth-child(3) {
        animation-delay: 0.15s;
      }

      .bounce-text span:nth-child(4) {
        animation-delay: 0.2s;
      }

      .bounce-text span:nth-child(5) {
        animation-delay: 0.25s;
      }

      .bounce-text span:nth-child(6) {
        animation-delay: 0.3s;
      }

      .bounce-text span:nth-child(7) {
        animation-delay: 0.35s;
      }

      @keyframes bounce {

        0%,
        100% {
          transform: translateY(0);
        }

        50% {
          transform: translateY(-0.5rem);
        }
      }

      footer {
        padding: 1rem 0 0 0;
        position: relative;
        left: 0;
        bottom: 0;
        width: 100%;
        color: antiquewhite;
        background-color: var(--color);
        text-align: center;
        z-index: 0;

        &:before {
          content: "";
          position: absolute;
          left: 0;
          right: 0;
          bottom: 0;
          -webkit-backdrop-filter: blur(5px);
          backdrop-filter: blur(5px);
        }
      }

      .wavy {
        width: 100%;
        height: 35px;
        background-color: var(--color);
        margin-top: -35px;
        padding: 0;
        clip-path: shape(from 0 100%, vline to 1rem, curve to 5.36% 1rem with 3.57% 1rem, curve to 8.93% 1.5rem with 7.14% 1rem, curve to 12.5% 2rem with 10.71% 2rem, curve to 16.07% 1.5rem with 14.29% 2rem, curve to 19.64% 1rem with 17.86% 1rem, curve to 23.21% 1.5rem with 21.43% 1rem, curve to 26.79% 1.5rem with 25% 2rem, curve to 30.36% 1.5rem with 28.57% 1rem, curve to 33.93% 1.5rem with 32.14% 2rem, curve to 37.5% 1.5rem with 35.71% 1rem, curve to 41.07% 1.5rem with 39.29% 2rem, curve to 44.64% 0.5rem with 42.86% 1rem, curve to 48.21% 0.5rem with 46.43% 0rem, curve to 51.79% 1.5rem with 50% 1rem, curve to 55.36% 1.5rem with 53.57% 2rem, curve to 58.93% 1.5rem with 57.14% 1rem, curve to 62.5% 1rem with 60.71% 2rem, curve to 66.07% 1rem with 64.29% 0rem, curve to 69.64% 1.5rem with 67.86% 2rem, curve to 73.21% 0.5rem with 71.43% 1rem, curve to 76.79% 0.5rem with 75% 0rem, curve to 80.36% 1rem with 78.57% 1rem, curve to 83.93% 1rem with 82.14% 1rem, curve to 87.5% 0.5rem with 85.71% 1rem, curve to 91.07% 0rem with 89.29% 0rem, curve to 94.64% 0.5rem with 92.86% 0rem, curve to 100% 1rem with 96.43% 1rem, vline to 100%, hline to 0);
      }

      .footer-content {
        position: relative;
        z-index: 2;
        /* Keeps text above bubbles */
      }

      .bubble {
        position: absolute;
        border-radius: 50%;
        background-color: var(--color);
      }

      @keyframes moveToTop {
        80% {
          opacity: 1.0;
        }

        100% {
          opacity: 0.08;
          transform: translate(-50%, -400%) scale(.2);
        }
      }

      @keyframes written {
        0% {
          background-position: 0vm 100vh;
        }

        33% {
          background-position: -50vw 50vh;
        }

        67% {
          background-position: -100vw 0vh;
        }
      }

      .center-container {
        text-align: center;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: rgba(255, 255, 255, 0.3);
        -webkit-backdrop-filter: grayscale(70%);
        backdrop-filter: grayscale(70%);
        height: 100vh;
        padding: 1rem 0;
      }

      /* Create four equal columns that floats next to each other */
      .column {
        text-align: center;
        min-width: 200px;
        border-right: solid antiquewhite 1px;
        padding: 0 1.5rem;
      }

      /* Clear floats after the columns */
      .row {
        width: 100%;
        display: flex;
        flex-flow: row wrap;
        justify-content: center;
        align-items: center;
        padding: 0;
        padding: 10px 0 8px 0;
      }

      .icon {
        display: inline-block;
        width: 3rem;
        height: 3rem;
        overflow: hidden;
        filter: invert(98%) sepia(6%) saturate(704%) hue-rotate(64deg) brightness(90%) contrast(91%);
        margin: 1rem 0 0 0;
      }

      .icon>svg {
        position: relative;
      }
      
      .our-logo {
        width:200px;
        height:200px;
      }  

      .button-53 {
        background-color: #005F5F;
        border: 0 solid antiquewhite;
        box-sizing: border-box;
        color: antiquewhite;
        display: flex;
        font-size: 1rem;
        font-weight: 700;
        justify-content: center;
        line-height: 1.75rem;
        padding: .75rem 1.65rem;
        position: relative;
        text-align: center;
        text-decoration: none antiquewhite solid;
        text-decoration-thickness: auto;
        width: 100%;
        max-width: 460px;
        position: relative;
        cursor: pointer;
        transform: rotate(-2deg);
        user-select: none;
        -webkit-user-select: none;
        touch-action: manipulation;
        margin: 1.5rem auto 1rem auto;
      }

      .button-53:focus {
        outline: 0;
      }

      .button-53:after {
        content: '';
        position: absolute;
        border: 1px solid antiquewhite;
        bottom: 4px;
        left: 4px;
        width: calc(100% - 1px);
        height: calc(100% - 1px);
      }

      .button-53:hover:after {
        bottom: 2px;
        left: 2px;
      }

      @media (min-width: 768px) {
        .button-53 {
          padding: .75rem 3rem;
          font-size: 1.25rem;
        }
      }

      /* Responsive layout - makes the four columns stack on top of each other instead of next to each other */
      @media (max-width: 700px) or (max-height: 700px) {
        .column {
          min-width: 100%;
          margin-left: 0;
          margin-right: 0;
          border: none;
        }

        .row {
          flex-flow: column nowrap;
        }

        .our-logo {
          width:80px;
          height:80px;
        }  

        h1 {
          font-size: 2.0rem;
          margin-left: 0;
          margin-right: 0;
        }

        h2 {
          font-size: 1.85rem;
          margin-left: 0;
          margin-right: 0;
        }

        h3 {
          font-size: 1.45rem;
          margin-left: 0;
          margin-right: 0;
        }

        h4 {
          margin-left: 0;
          margin-right: 0;
        }

        p {
          margin-left: 0;
          margin-right: 0;
        }

        footer {
          position: static;
        }

        hr {
          display: inline;
        }
      }
    </style>
    <script>
      window.onload = function() {
        var bubbles = document.getElementsByClassName("bubble");
        for (var i = 0; i < bubbles.length; i++) {
          var size = Math.floor(Math.random() * 3) + 1; // Random size 10-30px
          bubbles[i].style.width = size + 'rem';
          bubbles[i].style.height = size + 'rem';
          bubbles[i].style.left = Math.floor(Math.random() * 97) + '%';
          /*bubbles[i].style.bottom = "0"; // Start at bottom of footer */
          // Randomize animation duration and delay
          var duration = (Math.random() * 5 + 2.5) + 's';
          var delay = (Math.random() * -5) + 's';
          bubbles[i].style.animation = "moveToTop " + duration + " ease-in-out " + delay + " infinite";
        }
      };
    </script>
